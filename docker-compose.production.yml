services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: "Developer"
      # The server is a 2 GB RAM VPS; uncapped, SQL Server would grab most of
      # it (~80% of system memory by default). Remove this cap if the server is
      # ever rescaled to 4 GB+ RAM.
      MSSQL_MEMORY_LIMIT_MB: "1024"
    volumes:
      - sqldata:/var/opt/mssql
    # No host port mapping — the tunnel is outbound-only and nothing outside the
    # compose network needs to reach SQL Server directly.
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -C -b"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Loopback-only — reachable from the server itself (e.g. `curl localhost:8080`,
    # SSH tunnel) but not exposed to the internet. Public access goes through the
    # Cloudflare Tunnel -> ui's nginx reverse proxy instead.
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # Real production mode: no dev seed, no Swagger (both are gated on
      # IsDevelopment() in Program.cs) — this is the first real production deploy.
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=RentalPlatformDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: "RentalPlatform"
      Jwt__Audience: "RentalPlatform.Api"
      FileStorage__ListingsImagesPath: "uploads/listings"
      FileStorage__ChatAttachmentsPath: "uploads/chat"
      # Production starts from an empty database (no dev seed) — without these, there
      # would be no admin account at all. Read once on startup by AdminBootstrapRunner:
      # idempotent, and a no-op if the account already exists. See DEPLOY-PRODUCTION.md.
      Bootstrap__AdminEmail: ${BOOTSTRAP_ADMIN_EMAIL}
      Bootstrap__AdminPassword: ${BOOTSTRAP_ADMIN_PASSWORD}
      # Initial public catalogue (DemoContentBootstrapRunner): one showcase owner account
      # plus the curated Approved listings. Idempotent and additive-only — safe to leave
      # enabled. See DEPLOY-PRODUCTION.md.
      #
      # The `:-false` default is load-bearing, not cosmetic. Compose interpolates an unset
      # or empty .env var to an empty string and STILL sets the key ("" is not "absent"),
      # and the app reads this one via configuration.GetValue<bool>(), which THROWS
      # InvalidOperationException on "" instead of defaulting to false — that is a startup
      # crashloop, and since ui/cloudflared gate on api's `service_healthy`, it would take
      # the whole site down. `:-false` substitutes when the var is unset OR empty, which is
      # exactly the state .env.production.example ships. Must be exactly true/false —
      # other truthy spellings ("yes", "1") throw the same way.
      Bootstrap__DemoContentEnabled: ${BOOTSTRAP_DEMO_CONTENT_ENABLED:-false}
      # Plain strings, so empty is harmless: the runner no-ops when either is blank
      # (same contract as the admin pair above).
      Bootstrap__DemoOwnerEmail: ${BOOTSTRAP_DEMO_OWNER_EMAIL}
      Bootstrap__DemoOwnerPassword: ${BOOTSTRAP_DEMO_OWNER_PASSWORD}
    volumes:
      - uploads:/app/wwwroot/uploads/listings
      - chat-uploads:/app/wwwroot/uploads/chat
    healthcheck:
      # aspnet:8.0 (Debian bookworm-slim base) ships neither curl nor wget; bash IS
      # present, so we speak raw HTTP over bash's /dev/tcp pseudo-device against the
      # anonymous, DB-free /health endpoint instead of pulling in a tool.
      # Generous start_period: EF Core migrations + admin bootstrap + cold JIT start,
      # contending with SQL Server for CPU/RAM on a 1 vCPU / 2 GB box.
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf ''GET /health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n'' >&3 && head -n 1 <&3 | grep -q 200'
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ui:
    build: ../Rental-Ui
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    # Loopback-only, same rationale as api's port mapping above.
    ports:
      - "127.0.0.1:4200:80"
    healthcheck:
      # nginx:alpine (busybox) has wget but no curl. Must target 127.0.0.1, not
      # localhost: busybox wget resolves "localhost" to IPv6 ::1 first, but nginx.conf
      # only has "listen 80;" (IPv4) with no "listen [::]:80" — so "localhost" here
      # would connection-refuse forever and never report healthy.
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      ui:
        condition: service_healthy
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sqldata:
  uploads:
  chat-uploads:
