# ============================================================================
# NOT DEPLOYED — this file describes a stand that does not exist.
#
# No staging stand has ever been run. `test.dorent.am` does NOT resolve
# (NXDOMAIN): the Cloudflare Tunnel publishes only `dorent.am` and
# `www.dorent.am` -> http://ui:80. There is no staging route.
# The VPS runs production only (docker-compose.production.yml,
# ASPNETCORE_ENVIRONMENT=Production).
#
# A staging stand does not fit alongside production on the current 2 GB VPS
# (Hetzner CPX12): it is a second full stack including a second SQL Server
# (~1 GB, on top of production's 1 GB cap) — the OOM killer would likely take
# down the PRODUCTION database. It would also collide on the host ports
# 127.0.0.1:8080 and 127.0.0.1:4200, which production already binds.
#
# The seeded test environment is the local `docker-compose.yml` in this repo,
# not a remote stand.
#
# Reviving this needs a second VPS or a rescale to 4 GB RAM — see ADR-004 in
# `knowledge/decisions.md`. Kept (not deleted) as a legitimate starting point
# if a stand is ever funded. Everything below is a PLAN, not a description of
# anything that runs.
# ============================================================================

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: "Developer"
      # The stand was designed for a 2 GB RAM VPS; uncapped, SQL Server would grab
      # most of it (~80% of system memory by default). Remove this cap if the stand
      # is ever built on a 4 GB+ RAM server. (Note: on the CURRENT 2 GB VPS this cap
      # is not enough to make staging coexist with production — see the banner.)
      MSSQL_MEMORY_LIMIT_MB: "1024"
    volumes:
      - sqldata:/var/opt/mssql
    # No host port mapping — the tunnel is outbound-only and nothing outside the
    # compose network needs to reach SQL Server directly.
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -C -b"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Loopback-only — reachable from the server itself (e.g. `curl localhost:8080`,
    # SSH tunnel) but not exposed to the internet. Public access goes through the
    # Cloudflare Tunnel -> ui's nginx reverse proxy instead.
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # Deliberately "Development" for this test stand: it enables the idempotent
      # dev seed data and Swagger UI, which are useful while validating the stand.
      # TODO: switch to "Production" once this stops being a throwaway test stand.
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=RentalPlatformDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: "RentalPlatform"
      Jwt__Audience: "RentalPlatform.Api"
      FileStorage__ListingsImagesPath: "uploads/listings"
      FileStorage__ChatAttachmentsPath: "uploads/chat"
    volumes:
      - uploads:/app/wwwroot/uploads/listings
      - chat-uploads:/app/wwwroot/uploads/chat

  ui:
    build: ../Rental-Ui
    restart: unless-stopped
    depends_on:
      - api
    # Loopback-only, same rationale as api's port mapping above.
    ports:
      - "127.0.0.1:4200:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - ui
      - api

volumes:
  sqldata:
  uploads:
  chat-uploads:
